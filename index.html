<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiDict — by Hazel Wu</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    window.MathJax = {
      loader: { load: ['[tex]/textcomp'] },
      tex: {
        packages: { '[+]': ['textcomp'] },
        inlineMath: [['$', '$']]
      }
    };
  </script>

  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>

    body{
      font-family:Arial;
      background:#f4f4f4;
      margin:0;
    }

    h1{
      margin:20px;
    }

    h3{
      margin:0px;
    }

    .auth-box{
      margin:20px;
    }

    .container{
      display:none;
      flex-direction:column;
      align-items:center;
      margin:20px;
    }


.definition-cell{
  font-family: monospace;
}

    .actions-header{
      width:120px;
    }

.actions-cell{
  text-align:center;
  white-space:nowrap;
}

.actions-cell button:first-child{
  margin-right:5px;
  background:#bbddff;
}

.actions-cell button:last-child{
  margin-left:5px;
  background:#ee5555;
}

    table{
      width:80%;
      border-collapse:collapse;
      margin:20px;
    }

    th,td{
      vertical-align:middle;
      padding:12px;
      border:1px solid #ddd;
      white-space:pre-wrap;
    }

    th{
      background:#eeddff;
    }

    tr:nth-child(odd){background:#ffeeff;}
    tr:nth-child(even){background:#eeeeff;}

    button{
      padding:6px 10px;
      cursor:pointer;
    }

.form-container{
  width:80%;
  background:white;
  padding:20px 25px;
  margin:10px;
  border-radius:10px;
}

#entry-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

#entry-form input,
#entry-form textarea{
  width:100%;
  padding:10px;
  box-sizing:border-box;
}

#entry-form textarea{
  grid-column:1 / span 2;
  resize:vertical;
}

#entry-form button{
  grid-column:1 / span 2;
  justify-self:start;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  border-radius:6px;
  padding:20px;
  width:70%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.modal-content textarea{
  grid-column:1 / span 2;
  min-height:120px;
  resize:vertical;
}

  </style>
</head>

<body>

<h1 style="text-align: center">MultiDict — by Hazel Wu</h1>

<div class="auth-box" id="authBox" style="text-align: center">

  <div><input id="email" placeholder="Email" style="width:250px;padding:8px;margin:≥px"></div>
  <div><input id="password" type="password" placeholder="Password" style="width:250px;padding:8px;margin:5px"></div>
  <div><button onclick="signIn()" style="padding:8px;margin:5px">Log In</button></div>

</div>


<div class="container" id="dictionaryApp">

  <button onclick="signOut()">Log Out</button>

  <div class="form-container">

  <form id="entry-form">

    <h3 style="grid-column:1 / span 2;">New Entry</h3>

    <input id="word" placeholder="Enter Word" required>

    <input id="link" placeholder="Enter Link">

    <textarea id="definition" placeholder="Enter Definition"></textarea>

    <button type="submit">Add Entry</button>

  </form>

  </div>

  <table id="data-table">

    <thead>
      <tr>
        <th>Word</th>
        <th>Definition</th>
        <th class="actions-header">Actions</th>
      </tr>
    </thead>

    <tbody></tbody>

  </table>

</div>


<div id="editModal" class="modal">

  <div class="modal-content">

    <h3 style="grid-column:1 / span 2;">Edit Entry</h3>

    <input id="editWord">

    <input id="editLink">
    <textarea id="editDefinition" rows="4"></textarea>

    <button id="saveEdit">Save</button>
    <button onclick="closeModal()">Cancel</button>

  </div>

</div>


<script>

const supabaseUrl='https://wpyixlovraikzufifjhe.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndweWl4bG92cmFpa3p1ZmlmamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzUzNjUsImV4cCI6MjA4ODQ1MTM2NX0.AnmM-tVpVYGFCe42NozutnjU9rrTb7KMtBMjrESr4_Y';  // Replace with your Supabase anon key
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let editingId=null;



async function checkSession(){

  const {data}=await supabaseClient.auth.getSession();

  if(data.session){

    document.getElementById("authBox").style.display="none";
    document.getElementById("dictionaryApp").style.display="flex";

    fetchEntries();

  }

}

checkSession();



async function signIn(){

  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const {error}=await supabaseClient.auth.signInWithPassword({
    email:email,
    password:password
  });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("authBox").style.display="none";
  document.getElementById("dictionaryApp").style.display="flex";

  fetchEntries();

}



async function signOut(){

  await supabaseClient.auth.signOut();

  location.reload();

}



async function fetchEntries(){

  const {data,error}=await supabaseClient
  .from('dictionary')
  .select('*')
  .order('id');

  if(error){
    console.error(error);
    return;
  }

  const tableBody=document.querySelector("#data-table tbody");
  tableBody.innerHTML="";

  data.forEach(entry=>{

    const row=document.createElement("tr");

    const wordCell=document.createElement("td");

    const link=document.createElement("a");
    link.href=entry.link;
    link.target="_blank";
    link.textContent=entry.word;

    wordCell.appendChild(link);

    const defCell=document.createElement("td");
    defCell.className="definition-cell";
    defCell.innerHTML=entry.definition;

    const actionCell=document.createElement("td");
    actionCell.className="actions-cell";

    const editBtn=document.createElement("button");
    editBtn.textContent="Edit";
    editBtn.onclick=()=>openModal(entry);

    const deleteBtn=document.createElement("button");
    deleteBtn.textContent="Delete";
    deleteBtn.onclick=()=>deleteEntry(entry.id);

    actionCell.appendChild(editBtn);
    actionCell.appendChild(deleteBtn);

    row.appendChild(wordCell);
    row.appendChild(defCell);
    row.appendChild(actionCell);

    tableBody.appendChild(row);

  });

  MathJax.typesetPromise();

}



document.getElementById("entry-form").addEventListener("submit",async function(e){

  e.preventDefault();

  const word=document.getElementById("word").value;
  const definition=document.getElementById("definition").value;
  const link=document.getElementById("link").value;

  const {error}=await supabaseClient
  .from("dictionary")
  .insert([{word,definition,link}]);

  if(error){
    console.error(error);
    return;
  }

  document.getElementById("entry-form").reset();
  document.getElementById("link").value="chrome://new-tab-page";

  fetchEntries();

});



function openModal(entry){

  document.getElementById("editWord").value=entry.word;
  document.getElementById("editDefinition").value=entry.definition;
  document.getElementById("editLink").value=entry.link;

  editingId=entry.id;

  document.getElementById("editModal").style.display="flex";

}



function closeModal(){
  document.getElementById("editModal").style.display="none";
}



document.getElementById("saveEdit").onclick=async function(){

  const word=document.getElementById("editWord").value;
  const definition=document.getElementById("editDefinition").value;
  const link=document.getElementById("editLink").value;

  const {error}=await supabaseClient
  .from("dictionary")
  .update({word,definition,link})
  .eq("id",editingId);

  if(error){
    console.error(error);
    return;
  }

  closeModal();
  fetchEntries();

};



async function deleteEntry(id){

  const confirmDelete=confirm("Are you sure you want to delete this entry?");
  if(!confirmDelete) return;

  const {error}=await supabaseClient
  .from("dictionary")
  .delete()
  .eq("id",id);

  if(error){
    console.error(error);
    return;
  }

  fetchEntries();

}

</script>

</body>
</html>
